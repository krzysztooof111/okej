<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    /* Write your CSS Code here */
    .flag{
      height: 600px;
      width: 900px;
      background-color: #ce1126;
      text-align: center;
      color: white;
     
      position: relative;
    
    }
     
    .flag div div{
      height: 200px;
      width: 200px;
      border-radius: 50%;
      background-color: #fff;
    
      text-align: center;
      align-items: center;
      position: absolute;
      left: 40%;
      color: black;
      top: 20%;
      text-align: center;
      display: flex;
      justify-content: center;
      overflow: hidden;
     
    }
  
    p{
      margin: 0;
      text-align: center;
      font-size: 5rem;

    }
    .flag div{
      width: 100%;
      height: 50%;
      background-color: #002868;
      position: absolute;
      top: 25%;

    }
  </style>
</head>

  IMPORTANT! Do not change any HTML
Don't add any classes/ids/elements 
Use what you know about combining selectors

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
