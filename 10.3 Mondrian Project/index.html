<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    /* 
    Write your CSS here 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E
    For dimensions, see dimensions.png image.
    HINT: Remember you can't change the properties of grid lines.
    But grid lines are transparent!
    */
    body{
     
      margin: 0;
      
    }
    .container{
      display: grid;
      width: 748px;
      height: 748px;
     grid-template-columns: 320px 198px 153px 50px;
     grid-template-rows: 414px 130px 155px 20px;
      gap: 9px;
      background-color: black;
    

    }
    .red{
      background-color: #E72F24;
      
    }
    #zjesc{
      grid-column: span 3;
    }
    .whity{
      background-color: #F0F1EC;
    }
    #dwa{
      grid-row: span 2;
      grid-column: span 2;
    }
    #dwadwa{
     
       grid-row: 2/ span 2;
       
       
    }
    #blue{
      background-color: #004592;
      grid-row-start: 2;
      grid-column-start: 4;
      border-bottom: 10px solid black;
    }
    #white1{
      
      grid-row: 3/ span 2;
      grid-column: 4 / span 1;
    }
    #white2{
      grid-row-start: 4;
    }
    #yellow{
      background-color: #F9D01E;
      grid-row-start: 4;
      grid-column-start: 2;
    }
    .black{
      background-color: #232629;
      grid-row-start: 4;
      grid-column-start: 3;
    }
    
  </style>
</head>

<body>
  <!-- Write your HTML here -->
   <div class="container">
    <div class="red"></div>
    <div id="zjesc" class="whity"></div>
    <div id="dwa" class="whity"></div>
    <div id="dwadwa" class="whity"></div>
    <div id="blue" ></div>
    <div id="white1" class="whity"> </div>
    <div id="white2" class="whity"> </div>
    <div id="yellow" ></div>
    <div id="black"></div>

   </div>
</body>

</html>
